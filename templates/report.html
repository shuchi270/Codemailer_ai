<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Code Analysis Report from CodeMailer AI</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --card-bg: #1e293b;
            --border-color: #334155;
            --code-bg: #000000;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
        }
        h1, h2, h3, h4 {
            color: var(--accent-color);
            margin-top: 2em;
            margin-bottom: 0.5em;
        }
        h1 {
            margin-top: 0;
            font-size: 2.2em;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            text-align: center;
        }
        p { margin-bottom: 1.2em; }
        ul, ol { margin-bottom: 1.2em; padding-left: 20px; }
        li { margin-bottom: 0.5em; }
        code {
            font-family: 'Fira Code', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: var(--code-bg);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #fca5a5;
        }
        pre {
            background-color: var(--code-bg);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            margin: 1.5em 0;
            line-height: 1.5;
        }
        pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }
        
        /* Syntax Highlighting */
        .codehilite { background: var(--code-bg); color: #f8f8f2; }
        .codehilite .c, .codehilite .c1, .codehilite .cm, .codehilite .cs { color: #e2e8f0; font-style: italic; } /* Bright single-tone light comments */
        .codehilite .err { color: #f92672; } 
        .codehilite .k, .codehilite .kc, .codehilite .kd, .codehilite .kn, .codehilite .kp, .codehilite .kr, .codehilite .kt { color: #66d9ef; font-weight: bold; } 
        .codehilite .l, .codehilite .ld, .codehilite .m, .codehilite .mb, .codehilite .mf, .codehilite .mh, .codehilite .mi, .codehilite .il, .codehilite .mo { color: #ae81ff } 
        .codehilite .s, .codehilite .s1, .codehilite .s2, .codehilite .sa, .codehilite .sb, .codehilite .sc, .codehilite .dl, .codehilite .sd, .codehilite .se, .codehilite .sh, .codehilite .si, .codehilite .sx, .codehilite .sr, .codehilite .ss { color: #e6db74 } 
        .codehilite .na, .codehilite .nc, .codehilite .nd, .codehilite .ne, .codehilite .nf, .codehilite .nx { color: #a6e22e } 
        .codehilite .o, .codehilite .ow { color: #f92672 } 
        .codehilite .p { color: #f8f8f2 } 
        .codehilite .nt { color: #f92672 } 
        .codehilite .nv, .codehilite .vc, .codehilite .vg, .codehilite .vi { color: #f8f8f2 } 
        .codehilite .ge { font-style: italic }
        .codehilite .gs { font-weight: bold }
        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 2em 0;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9em;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Code Analysis Report</h1>
        <div class="content">
            {{ analysis | safe }}
        </div>
        <div class="footer">
            <p>Generated by <strong>CodeMailer AI</strong> 🚀</p>
        </div>
    </div>
</body>
</html>
