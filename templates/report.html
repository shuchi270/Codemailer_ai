<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Analysis Report — CodeMailer AI</title>
    <style>
        /* ── Reset & base ──────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont,
                         'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.7;
            margin: 0;
            padding: 40px 20px;
        }

        /* ── Container ─────────────────────────────────────────── */
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #1e293b;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            border: 1px solid #334155;
        }

        /* ── Typography ────────────────────────────────────────── */
        h1, h2, h3, h4 {
            color: #38bdf8;
            margin-top: 2em;
            margin-bottom: 0.5em;
            letter-spacing: -0.02em;
        }

        h1 {
            margin-top: 0;
            font-size: 2em;
            border-bottom: 2px solid #334155;
            padding-bottom: 12px;
            text-align: center;
        }

        h2 { font-size: 1.5em; color: #7dd3fc; }
        h3 { font-size: 1.2em; color: #93c5fd; }

        p  { margin-bottom: 1.2em; }

        strong { color: #f1f5f9; }

        ul, ol {
            margin-bottom: 1.2em;
            padding-left: 24px;
        }

        li { margin-bottom: 0.5em; }

        /* ── Inline code ───────────────────────────────────────── */
        code {
            font-family: 'Fira Code', 'JetBrains Mono', 'Menlo',
                         'Monaco', 'Courier New', monospace;
            background-color: #0f172a;
            padding: 0.15em 0.4em;
            border-radius: 4px;
            font-size: 0.88em;
            color: #fca5a5;
            border: 1px solid #334155;
        }

        /* ── Code blocks ───────────────────────────────────────── */
        pre {
            background-color: #0f172a;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            border: 1px solid #334155;
            margin: 1.5em 0;
            line-height: 1.6;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            border: none;
            color: inherit;
        }

        /* ── Pygments highlighting (inline styles from Monokai) ─ */
        .codehilite {
            background: #0f172a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #334155;
            display: block;
            overflow-x: auto;
            margin: 1.5em 0;
        }

        /* ── Horizontal rule ───────────────────────────────────── */
        hr {
            border: 0;
            border-top: 1px solid #334155;
            margin: 2em 0;
        }

        /* ── Footer ────────────────────────────────────────────── */
        .footer {
            margin-top: 48px;
            text-align: center;
            font-size: 0.85em;
            color: #64748b;
        }

        .footer strong { color: #38bdf8; }

        /* ── Responsive ────────────────────────────────────────── */
        @media (max-width: 640px) {
            body { padding: 16px 8px; }
            .container { padding: 24px 16px; }
            h1 { font-size: 1.5em; }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Code Analysis Report</h1>
        <div class="content">
            {{ analysis | safe }}
        </div>
        <div class="footer">
            <p>Generated by <strong>CodeMailer AI</strong> 🚀</p>
        </div>
    </div>
</body>

</html>
