<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Code Analysis Report from CodeMailer AI</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #eceef2;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1,
        h2,
        h3,
        h4 {
            color: #38bdf8;
            margin-top: 2em;
            margin-bottom: 0.5em;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2em;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            text-align: center;
        }

        p {
            margin-bottom: 1.2em;
        }

        ul,
        ol {
            margin-bottom: 1.2em;
            padding-left: 20px;
        }

        li {
            margin-bottom: 0.5em;
        }

        code {
            font-family: 'Fira Code', 'Menlo', 'Monaco', 'Courier New', monospace;
            background-color: #000000;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #fca5a5;
        }

        pre {
            background-color: #000000;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid #334155;
            margin: 1.5em 0;
            line-height: 1.5;
        }

        pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        /* Syntax Highlighting */
        .codehilite {
            background: #000000;
            color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            display: block;
            overflow-x: auto;
        }

        .codehilite span {
            color: #ffffff !important;
        }

        .codehilite .c,
        .codehilite .c1,
        .codehilite .cm,
        .codehilite .cs {
            font-style: italic;
            color: #ffffff !important;
        }

        .codehilite .k,
        .codehilite .kc,
        .codehilite .kd,
        .codehilite .kn,
        .codehilite .kp,
        .codehilite .kr,
        .codehilite .kt {
            font-weight: bold;
            color: #ffffff !important;
        }

        .codehilite .ge {
            font-style: italic;
        }

        .codehilite .gs {
            font-weight: bold;
        }

        hr {
            border: 0;
            border-top: 1px solid #334155;
            margin: 2em 0;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9em;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Code Analysis Report</h1>
        <div class="content">
            {{ analysis | safe }}
        </div>
        <div class="footer">
            <p>Generated by <strong>CodeMailer AI</strong> 🚀</p>
        </div>
    </div>
</body>

</html>
